      1 Google Play: https://play.google.com/store/apps/details?id=chat.delta
      2 F-Droid: https://f-droid.org/app/com.b44t.messenger
      3 Obtainium: obtainium://app/{%22id%22:%22chat.delta%22,%22url%22:%22https://github.com/deltachat/deltachat-android%22,%22author%22:%22Delta%20Chat%20Contributors%22,%22name%22:%22Delta%20Chat%22,%22additionalSettings%22:%22{\%22about\%22:\%22Decentralized%20private%20messenger%20with%20chat-shared%20tools%20and%20games.\%22}%22}
    2 iOS: https://apps.apple.com/app/delta-chat/id1459523234
    3 Windows: https://apps.microsoft.com/detail/9pjtxx7hn3pk
    4 macOS:
      1 AppStore: https://apps.apple.com/app/delta-chat-desktop/id1462750497
