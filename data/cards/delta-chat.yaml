title: Delta Chat
icon: delta-chat.svg
description: >
  Простой в использовании приватный мессенджер со сквозным шифрованием. Не
  требует номер телефона и прочие персональные данные. Поддерживаются многие
  функции популярных мессенджеров, включая синхронизацию, звонки, каналы, боты,
  мини-приложения. Имеет открытую инфраструктуру и децентрализованную сеть.
  Защищён от нежелательных сообщений и спама на архитектурном уровне.
  Некоммерческий проект, полностью бесплатный и без рекламы.
homepage: https://delta.chat/ru
kttpage: /software/delta-chat
help: https://delta.chat/help
repository: https://github.com/deltachat
license: gnu-gpl-3.0
donate: https://delta.chat/donate
