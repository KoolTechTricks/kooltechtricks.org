title: Nicolium
icon: nicolium.svg
description: >
  Веб-приложение для Mastodon и других совместимых сервисов Fediverse.
  Реализует многие основные и расширенные возможности, а также добавляет
  собственные мелкие полезные функции.
homepage: https://nicolium.app
docs: https://nicolium.app/docs
issues: https://codeberg.org/nicolium/nicolium/issues
repository: https://codeberg.org/nicolium/nicolium
license: gnu-agpl-3.0
